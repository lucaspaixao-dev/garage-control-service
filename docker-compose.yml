services:
  postgres:
    image: postgres:16-alpine
    container_name: garage-postgres
    environment:
      POSTGRES_DB: garage
      POSTGRES_USER: garage
      POSTGRES_PASSWORD: garage
    ports:
      - "5432:5432"
    volumes:
      - garage-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U garage -d garage"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  garage-pgdata:
