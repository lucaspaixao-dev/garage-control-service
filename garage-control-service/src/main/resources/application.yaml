spring:
  application:
    name: garage-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/garage}
    username: ${SPRING_DATASOURCE_USERNAME:garage}
    password: ${SPRING_DATASOURCE_PASSWORD:garage}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  cloud:
    aws:
      region:
        static: ${AWS_REGION:us-east-1}
      credentials:
        access-key: ${AWS_ACCESS_KEY_ID:test}
        secret-key: ${AWS_SECRET_ACCESS_KEY:test}
      # Points every AWS client at LocalStack in local/dev; unset in real envs.
      endpoint: ${AWS_ENDPOINT:http://localhost:4566}

garage:
  api:
    base-url: ${GARAGE_API_BASE_URL:http://localhost:3000}
  events:
    queue-name: ${VEHICLE_EVENTS_QUEUE:vehicle-events.fifo}

server:
  port: ${SERVER_PORT:8080}
